<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Scan</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FFD700" />

  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icons/icon-512.png" />

  <link rel="stylesheet" href="style.css" />

  <!--Add JsBarcode for offline barcode generation -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>

<body>
  <header>
    <h1 id="refreshDataButton">Easy Scan</h1>
    <button id="themeToggle" aria-label="Toggle theme">🌙</button>
  </header>

  <main>
    <!-- Search bar directly under header -->
    <div class="search-wrap">
      <input
        type="text"
        id="searchBox"
        placeholder="Enter last 6-7 digits or SKU"
        autocomplete="off"
        aria-label="Search"
      />
    </div>

    <!-- Result area (loader + cards appear here) -->
    <div id="result" role="region" aria-live="polite"></div>
  </main>

  <div id="signature">Rauf..</div>

  <!-- Main script -->
  <script src="script.js"></script>

  <!-- Service worker -->
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => {

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;

        newWorker.addEventListener('statechange', () => {
          if (
            newWorker.state === 'installed' &&
            navigator.serviceWorker.controller
          ) {
            if (confirm('New version available. Update now?')) {
              newWorker.postMessage({ action: 'skipWaiting' });
            }
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    });
}
  </script>
